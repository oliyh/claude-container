services:
  claude-dev:
    build: .
    tty: true
    environment:
      - REPO=${REPO}
      - GITHUB_TOKEN={{project.GITHUB_TOKEN}}
      - CLAUDE_CREDENTIALS={{project.CLAUDE_CREDENTIALS}}
      - GIT_USER_NAME=Oliver Hine
      - GIT_USER_EMAIL=git@oliy.co.uk
      # Optional: name shown in the mobile app (defaults to repo name)
      - SESSION_NAME=${SESSION_NAME:-}
    volumes:
      # Persists OAuth token, .claude.json config, dep caches (.m2, .lein, .clojure, .npm)
      # First run will print an auth URL to logs — tap it on your phone to authenticate
      - dev-home:/home/dev
    restart: "no"

volumes:
  dev-home:
